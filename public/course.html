<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>UNESWA Engineering Society - Downloads</title>
  <link rel="stylesheet" href="demoocss.css">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
  <section class="sub_header">
    <nav>
      <a href="index.html"><img src="images/logo.png" alt="Logo"></a>
      <div class="nav-links" id="navLinks">
        <i class="fa fa-times" onclick="hideMenu()"></i>
        <ul>
          <li><a href="index.html">HOME</a></li>
          <li><a href="about.html">ABOUT</a></li>
          <li><a href="newsletter/index.html">NEWSLETTER</a></li>
          <li><a href="course.html">DOWNLOADS</a></li>
          <li><a href="https://learn.uneswa.ac.sz/login/index.php">MOODLE</a></li>
        </ul>
      </div>
      <i class="fa fa-bars" onclick="showMenu()"></i>
    </nav>
    <h1>Study Material</h1>
  </section>

  <section class="course">
    <h1>Downloadable Courses</h1>
    <div style="text-align:center; margin-bottom:30px;">
      <input type="text" id="searchInput" placeholder="🔍 Search by course code or name" style="padding:10px; width:60%; border-radius:30px; border:1px solid #ccc;">
      <select id="semesterFilter" style="padding:10px; margin-left:10px; border-radius:30px;">
        <option value="">All Semesters</option>
        <option value="3">Semester 3</option>
        <option value="4">Semester 4</option>
        <option value="5">Semester 5</option>
        <option value="6">Semester 6</option>
        <option value="7">Semester 7</option>
        <option value="8">Semester 8</option>
        <option value="9">Semester 9</option>
        <option value="10">Semester 10</option>
      </select>
    </div>
    <div id="coursesContainer" class="row" style="flex-wrap: wrap;"></div>
  </section>

  <footer class="footer">
    <h4>About Us</h4>
    <p>Equipping students with engineering information to cultivate skills and opportunities.</p>
    <div class="icons">
      <a href="https://www.facebook.com/profile.php?id=61551477411980"><i class="fa fa-facebook"></i></a>
      <a href="https://api.whatsapp.com/send?phone=26876928350"><i class="fa fa-whatsapp"></i></a>
      <a href="https://instagram.com/uneswa.engineering.society"><i class="fa fa-instagram"></i></a>
      <a href="https://www.linkedin.com/company/uneswa-engineering-society"><i class="fa fa-linkedin"></i></a>
      <p>Made with <i class="fa fa-heart-o"></i> by M.</p>
    </div>
  </footer>

  <script>
    var navLinks = document.getElementById("navLinks");
    function showMenu() { navLinks.style.right = "0"; }
    function hideMenu() { navLinks.style.right = "-200px"; }

    let allCourses = [];

    async function loadCourses() {
      try {
        const res = await fetch('/api/courses');
        allCourses = await res.json();
        filterAndDisplay();
      } catch (err) {
        console.error(err);
      }
    }

    function filterAndDisplay() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const semesterVal = document.getElementById('semesterFilter').value;
      let filtered = allCourses.filter(c => 
        (semesterVal === '' || c.semester == semesterVal) &&
        (c.course_code.toLowerCase().includes(searchTerm) || c.course_name.toLowerCase().includes(searchTerm))
      );
      // Group by semester
      const grouped = {};
      filtered.forEach(c => {
        if (!grouped[c.semester]) grouped[c.semester] = [];
        grouped[c.semester].push(c);
      });
      const container = document.getElementById('coursesContainer');
      if (Object.keys(grouped).length === 0) {
        container.innerHTML = '<p style="width:100%; text-align:center;">No courses found.</p>';
        return;
      }
      let html = '';
      for (let sem in grouped) {
        html += `<div style="width:100%; margin-bottom:30px;"><h2>Semester ${sem}</h2><div class="row" style="flex-wrap:wrap;">`;
        grouped[sem].forEach(course => {
          html += `
            <div class="course-col" style="flex:1; min-width:200px; margin:10px;">
              <h3>${course.course_code}</h3>
              <p>${course.course_name}</p>
              <a href="${course.download_url}" class="hero-btn explore-btn" style="display:inline-block; margin-top:10px;" download>📥 Download</a>
            </div>
          `;
        });
        html += `</div></div>`;
      }
      container.innerHTML = html;
    }

    document.getElementById('searchInput').addEventListener('input', filterAndDisplay);
    document.getElementById('semesterFilter').addEventListener('change', filterAndDisplay);
    loadCourses();
  </script>
</body>
</html>
