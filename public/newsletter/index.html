<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter - UNESWA Engineering Society</title>
    <link rel="stylesheet" href="../demoocss.css">
</head>
<body style="text-align: center; padding: 50px;">
    <h1>📬 Newsletter Archive</h1>
    <p>Coming soon – past editions and signup form.</p>
    <a href="../index.html" class="hero-btn">Back to Home</a>
    
    <!-- Dark mode toggle (optional) -->
    <button class="dark-mode-toggle" id="darkModeToggle" style="position:fixed; bottom:20px; right:20px;">🌙</button>
    <script>
        const toggle = document.getElementById('darkModeToggle');
        if (toggle) {
            toggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
            });
            if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
